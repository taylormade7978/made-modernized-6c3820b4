name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Build all targets (libs, bins, AND test targets) so a broken test
      # target fails CI here rather than slipping through a plain `cargo build`.
      - name: Build (all targets)
        run: cargo build --workspace --all-targets

      - name: Compile test targets
        run: cargo test --workspace --no-run

      - name: Test
        run: cargo test --workspace

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # Lint gate: clippy across every crate and target, warnings promoted to errors
  # so a lint regression fails the PR instead of accumulating as debt.
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # Build the GameSession rules crate to WASM with wasm-pack — the exact bundler
  # target the PWA consumes — so a change that breaks the browser build fails
  # here rather than in the client's Vite/Dockerfile build.
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: wasm-pack build (bundler target)
        run: wasm-pack build crates/game-session --target bundler -- --features wasm

  # Content gate: replay every catalog entry (content/catalog/*.json) through its
  # domain aggregate's own invariants via the content-validator binary, so a
  # catalog data change that would violate a card rule fails the PR.
  content-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Validate content catalog
        run: cargo run -q -p domain --bin content-validator -- content/catalog

  # PWA client: type-check + Vite production build (manifest + service worker).
  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  # Build the production container image for the PWA (made.vforce360.ai) and, on
  # a push to main, tag + push it to the deploy-configured registry and publish a
  # versioned OTA bundle to MinIO. On PRs the image is built (Dockerfile is
  # validated) but neither pushed nor published — no secrets are needed there.
  web-image:
    runs-on: ubuntu-latest
    needs: web-build
    permissions:
      contents: read
      packages: write
    env:
      # Deploy-time-configured registry: override via repo/org Actions variables,
      # defaulting to GHCR for this repo.
      REGISTRY: ${{ vars.WEB_REGISTRY || 'ghcr.io' }}
      IMAGE_NAME: ${{ vars.WEB_IMAGE_NAME || format('{0}/made-pwa', github.repository) }}
      IS_RELEASE: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Version = PWA package version + short commit sha (e.g. 0.1.0+1a2b3c4);
      # reused as the image tag, the image label, and the OTA bundle prefix so
      # the container and the OTA bundle are the same identity.
      - name: Compute OTA version
        id: ver
        run: |
          SHORT="${GITHUB_SHA::7}"
          echo "sha_short=${SHORT}" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./web/package.json').version")+${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest,enable=${{ env.IS_RELEASE }}

      - name: Log in to the registry
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.WEB_REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.WEB_REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      # Always build (validates the multi-stage Dockerfile in PRs); push only on
      # a main release. Context is the repo root — the wasm crate lives outside web/.
      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          target: runtime
          build-args: |
            OTA_VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ env.IS_RELEASE == 'true' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Export the built bundle from the `dist` stage (cache-reused from above) so
      # the exact bytes baked into the image become the OTA bundle.
      - name: Export OTA bundle
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          target: dist
          outputs: type=local,dest=web/ota-dist
          cache-from: type=gha

      - name: Install MinIO client (mc)
        if: ${{ env.IS_RELEASE == 'true' }}
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o "$RUNNER_TEMP/mc"
          install -m 0755 "$RUNNER_TEMP/mc" /usr/local/bin/mc

      - name: Publish versioned OTA bundle to MinIO
        if: ${{ env.IS_RELEASE == 'true' }}
        working-directory: web
        env:
          MINIO_ENDPOINT: ${{ vars.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          GIT_SHA: ${{ steps.ver.outputs.sha_short }}
          DIST_DIR: ota-dist
        run: ./scripts/publish-ota.sh

  # Build the production backend container image (`made-server`) and prove it
  # boots into a passing health/smoke check. The image compiles against the
  # committed sqlx offline metadata, so no database is needed at build time. On a
  # push to main the validated image is tagged + pushed to the deploy-configured
  # registry; on PRs it is built and smoke-tested but neither pushed (no secrets).
  server-image:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ${{ vars.SERVER_REGISTRY || 'ghcr.io' }}
      IMAGE_NAME: ${{ vars.SERVER_IMAGE_NAME || format('{0}/made-server', github.repository) }}
      IS_RELEASE: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Version = workspace crate version + short commit sha (e.g. 0.1.0+1a2b3c4),
      # reused as the image tag and the image label so the tag and provenance
      # label are one identity.
      - name: Compute image version
        id: ver
        run: |
          SHORT="${GITHUB_SHA::7}"
          CRATE_VER="$(grep -m1 -E '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "version=${CRATE_VER}+${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest,enable=${{ env.IS_RELEASE }}

      # Build and load into the local daemon (single-platform) so the smoke test
      # can run the exact image bytes. Context is the repo root — the build needs
      # the whole workspace, .sqlx/, and migrations/.
      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/server/Dockerfile
          target: runtime
          load: true
          tags: made-server:ci
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      # Boot the container and prove it serves a passing health check and the
      # Prometheus scrape surface, with no Postgres/Redis in reach (both connect
      # lazily / fail soft, so the process still binds and serves its probes).
      - name: Container smoke / health check
        run: |
          docker run -d --name made-server-smoke -p 8080:8080 made-server:ci
          ok=
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then ok=1; break; fi
            sleep 1
          done
          if [ -z "$ok" ]; then echo "health check never passed"; docker logs made-server-smoke; exit 1; fi
          echo "/health OK"
          curl -fsS http://127.0.0.1:8080/metrics | grep -q '^made_http_requests_total' \
            || { echo "/metrics did not expose the prometheus surface"; docker logs made-server-smoke; exit 1; }
          echo "/metrics OK"
          docker rm -f made-server-smoke

      - name: Log in to the registry
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.SERVER_REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.SERVER_REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      # Push the cache-reused image on a main release only.
      - name: Push image
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/server/Dockerfile
          target: runtime
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server

  # Apply the sqlx migrations to a throwaway Postgres service container to prove
  # they migrate a *fresh* database cleanly in forward order, then verify the
  # committed offline query metadata (`.sqlx/`) is current against that schema.
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: made
          POSTGRES_PASSWORD: made
          POSTGRES_DB: made
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U made"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://made:made@localhost:5432/made
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version "^0.8" --no-default-features --features rustls,postgres --locked

      # Forward-only apply against the fresh service container.
      - name: Run migrations (fresh DB, forward order)
        run: sqlx migrate run --source migrations

      # The runner binary is the local twin of the CLI; prove it is wired too.
      - name: Run migrations via the made-migrate binary (idempotent)
        run: cargo run -p persistence --bin made-migrate

      # The sqlx-backed repository adapters. Their `#[sqlx::test]` suites are
      # gated behind the `integration-tests` feature (off by default) so the
      # DB-free build-and-test job does not try to run them without a database;
      # this is the one job with a Postgres service, so it enables the feature
      # and exercises every adapter — round-trips, typed optimistic-concurrency
      # conflicts, and the transactional multi-row invariants — for real. Each
      # test provisions its own ephemeral database via DATABASE_URL.
      - name: Repository adapter integration tests (real Postgres)
        run: cargo test -p persistence --features integration-tests

      # Fail if a query changed but `cargo sqlx prepare` was not re-run. Setting
      # DATABASE_URL (a real env var) overrides the offline default from
      # .cargo/config.toml, so the check validates queries live against the DB.
      - name: Verify offline query metadata is current
        run: cargo sqlx prepare --workspace --check

  # Render + lint the Helm chart against both environment overlays without a
  # cluster, so a template or values regression fails the PR. No secrets needed,
  # so this runs on every PR (unlike the deploy job below).
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint + template both overlays
        run: |
          for env in dev prod; do
            echo "::group::helm lint ($env)"
            helm lint deploy/helm/made -f "deploy/helm/made/values-${env}.yaml"
            helm template made deploy/helm/made \
              -f "deploy/helm/made/values-${env}.yaml" >/dev/null
            echo "::endgroup::"
          done

  # Roll the images out to the target namespace with the environment-scoped
  # overlay. Gated on the image + test jobs so we never deploy a build that did
  # not pass CI or push its images.
  #
  # This job runs on EVERY event, but its behaviour forks on IS_RELEASE:
  #   * On a PR it renders the exact chart + overlay + pinned image tags the
  #     release will apply (`helm template`, no cluster required) so the deploy
  #     path is validated on every PR instead of silently skipped.
  #   * On a merge to main it materializes the cluster credential and runs the
  #     real `helm upgrade --install --wait` apply.
  # Binding the protected GitHub Environment (`vars.DEPLOY_ENV`, default `prod`,
  # carrying required-reviewer / wait-timer protection and the KUBECONFIG
  # secret) only on the release event keeps PRs from stalling on reviewers.
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test, migrations, web-image, server-image, content-validate]
    environment: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && (vars.DEPLOY_ENV || 'prod') || '' }}
    env:
      IS_RELEASE: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      DEPLOY_ENV: ${{ vars.DEPLOY_ENV || 'prod' }}
      DEPLOY_NAMESPACE: ${{ vars.DEPLOY_NAMESPACE || 'made' }}
      SERVER_REGISTRY: ${{ vars.SERVER_REGISTRY || 'ghcr.io' }}
      SERVER_IMAGE_NAME: ${{ vars.SERVER_IMAGE_NAME || format('{0}/made-server', github.repository) }}
      WEB_REGISTRY: ${{ vars.WEB_REGISTRY || 'ghcr.io' }}
      WEB_IMAGE_NAME: ${{ vars.WEB_IMAGE_NAME || format('{0}/made-pwa', github.repository) }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      # Recompute the same version identities the image jobs pushed under, so the
      # release deploys exactly those tags (crate/pkg version + short sha).
      - name: Compute image tags
        id: ver
        run: |
          SHORT="${GITHUB_SHA::7}"
          CRATE_VER="$(grep -m1 -E '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          PKG_VER="$(node -p "require('./web/package.json').version")"
          echo "server_tag=${CRATE_VER}+${SHORT}" >> "$GITHUB_OUTPUT"
          echo "web_tag=${PKG_VER}+${SHORT}" >> "$GITHUB_OUTPUT"

      # PR-safe validation: render the release manifests (chart + environment
      # overlay + pinned image tags) without a cluster, so a deploy-breaking
      # template/values change fails the PR here rather than at merge time.
      - name: Render deploy manifests (dry run)
        env:
          SERVER_TAG: ${{ steps.ver.outputs.server_tag }}
          WEB_TAG: ${{ steps.ver.outputs.web_tag }}
        run: |
          helm template made deploy/helm/made \
            --namespace "$DEPLOY_NAMESPACE" \
            -f "deploy/helm/made/values-${DEPLOY_ENV}.yaml" \
            --set "components.server.image.repository=${SERVER_REGISTRY}/${SERVER_IMAGE_NAME}" \
            --set "components.server.image.tag=${SERVER_TAG}" \
            --set "components.web.image.repository=${WEB_REGISTRY}/${WEB_IMAGE_NAME}" \
            --set "components.web.image.tag=${WEB_TAG}" >/dev/null
          echo "deploy manifests rendered for '${DEPLOY_ENV}' (server=${SERVER_TAG}, web=${WEB_TAG})"

      # Materialize the cluster credential from the environment secret. Release
      # only — PRs have no cluster and never reach the real apply below.
      - name: Configure kubeconfig
        if: ${{ env.IS_RELEASE == 'true' }}
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "KUBECONFIG secret is not set for environment '$DEPLOY_ENV'" >&2
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_DATA" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      # Apply the chart to the namespace with the environment overlay, pinning
      # both component images to the tags pushed for this commit. --wait blocks
      # until the rollout is Ready (or times out and fails the deploy).
      - name: Helm upgrade --install
        if: ${{ env.IS_RELEASE == 'true' }}
        env:
          SERVER_TAG: ${{ steps.ver.outputs.server_tag }}
          WEB_TAG: ${{ steps.ver.outputs.web_tag }}
        run: |
          helm upgrade --install made deploy/helm/made \
            --namespace "$DEPLOY_NAMESPACE" --create-namespace \
            -f "deploy/helm/made/values-${DEPLOY_ENV}.yaml" \
            --set "components.server.image.repository=${SERVER_REGISTRY}/${SERVER_IMAGE_NAME}" \
            --set "components.server.image.tag=${SERVER_TAG}" \
            --set "components.web.image.repository=${WEB_REGISTRY}/${WEB_IMAGE_NAME}" \
            --set "components.web.image.tag=${WEB_TAG}" \
            --wait --timeout 5m
          helm status made --namespace "$DEPLOY_NAMESPACE"
