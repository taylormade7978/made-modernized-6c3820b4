{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "made.secretName" . }}
  namespace: {{ include "made.namespace" . }}
  labels:
    {{- include "made.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /*
  Only emit keys that carry a value. This keeps empty placeholders out of the
  rendered Secret so a partial deploy (e.g. TEMPORAL_API_KEY unused) never ships
  a blank credential that would shadow one injected another way.
  */}}
  {{- range $k, $v := .Values.secrets.data }}
  {{- if $v }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
