# Hardened static server for the MADE PWA bundle. Included by the base image's
# http{} block at /etc/nginx/conf.d/default.conf. Runs rootless (uid 101) on
# 8080 via the nginxinc/nginx-unprivileged base.
#
# Caching strategy: content-hashed assets (/assets, /vendor, /icons) are
# immutable and cached for a year; the app shell (index.html), the service
# worker, and the manifest are always revalidated so an OTA bundle refresh
# lands on the next launch. `expires` (not `add_header`) is used for cache
# control so the server-level security `add_header`s keep inheriting into every
# location — nginx drops inherited add_headers from any block that declares its
# own.

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;
    server_tokens off;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers (apply to every response; `always` covers errors) ────
    add_header X-Content-Type-Options   "nosniff"                              always;
    add_header X-Frame-Options          "DENY"                                 always;
    add_header Referrer-Policy          "no-referrer"                          always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin"                      always;
    add_header Cross-Origin-Resource-Policy "same-origin"                      always;
    # 'wasm-unsafe-eval' lets the rules-WASM instantiate; 'unsafe-inline' covers
    # the inline import map + the injected service-worker registration.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; connect-src 'self' https: wss:; worker-src 'self'; manifest-src 'self'" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/manifest+json application/wasm;

    # ── Health check (cheap, unlogged, no body dependency) ────────────────────
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ── WASM: force the correct MIME so streaming instantiation works ─────────
    # Regex locations win over the prefix locations below, so the rules-WASM
    # under /vendor/ is served as application/wasm and cached immutably.
    location ~* \.wasm$ {
        default_type application/wasm;
        expires 1y;
    }

    # ── Content-hashed, immutable assets ──────────────────────────────────────
    location /assets/ { expires 1y; }
    location /vendor/ { expires 1y; }
    location /icons/  { expires 30d; }

    # ── Revalidate-always shell + PWA control files ───────────────────────────
    location = /index.html            { expires -1; }
    location = /sw.js                  { expires -1; }
    location = /registerSW.js         { expires -1; }
    location = /manifest.webmanifest  { expires -1; }

    # ── SPA fallback: unknown paths resolve to the app shell ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
